version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: ses-app-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ses_user
      POSTGRES_PASSWORD: ses_password
      POSTGRES_DB: ses_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: